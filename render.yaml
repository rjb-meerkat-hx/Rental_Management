services:
  - type: web
    name: rentflow-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_DB_PATH
        value: /var/data/rentflow.db
      - key: CORS_ORIGIN
        sync: false
    disks:
      - name: rentflow-data
        mountPath: /var/data
        sizeGB: 1
